name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: px-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: px-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: px-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build standalone binary
        run: |
          bun build packages/px/src/index.ts \
            --compile \
            --target ${{ matrix.target }} \
            --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate version tag
        id: version
        run: |
          TAG="v0.1.0-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x artifacts/px-*
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "px ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            artifacts/px-*
